version: '3.8'

services:
  planner-analytics-db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=${ANALYTICS_DB_USERNAME}
      - POSTGRES_PASSWORD=${ANALYTICS_DB_PASSWORD}
      - POSTGRES_DB=${ANALYTICS_DB_DATABASE}
    ports:
      - "5440:5432"
    volumes:
      - planner-analytics-data:/var/lib/postgresql      